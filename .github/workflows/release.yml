name: Build and Release DMG

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build archive
        run: |
          xcodebuild archive \
            -project doksli.xcodeproj \
            -scheme doksli \
            -configuration Release \
            -archivePath $RUNNER_TEMP/doksli.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          mkdir -p $RUNNER_TEMP/export
          cp -R $RUNNER_TEMP/doksli.xcarchive/Products/Applications/Doksli.app $RUNNER_TEMP/export/

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Doksli" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Doksli.app" 180 170 \
            --app-drop-link 480 170 \
            --hide-extension "Doksli.app" \
            $RUNNER_TEMP/Doksli-${{ github.event.release.tag_name }}.dmg \
            $RUNNER_TEMP/export/

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/Doksli-${{ github.event.release.tag_name }}.dmg
